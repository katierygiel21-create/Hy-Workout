<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏁 My HYROX Training Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #f7d6df;
    --pink-dark: #e8aabb;
    --pink-accent: #d4849a;
    --yellow: #fef3c7;
    --yellow-dark: #fde68a;
    --yellow-accent: #f59e0b;
    --blue: #dbeafe;
    --blue-dark: #bfdbfe;
    --blue-accent: #7cb9e8;
    --white: #fffdf9;
    --text: #3d2b35;
    --text-light: #7a5c6a;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Petal background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 10% 20%, #fce4ec88 0%, transparent 50%),
      radial-gradient(ellipse at 90% 10%, #e3f2fd88 0%, transparent 50%),
      radial-gradient(ellipse at 50% 90%, #fffde788 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, #fce4ec55 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 36px 0 20px;
    animation: fadeDown 0.8s ease both;
  }

  .header .emoji-row {
    font-size: 28px;
    letter-spacing: 6px;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--pink-accent);
    line-height: 1.2;
    letter-spacing: -0.5px;
  }

  .header h1 span {
    font-style: italic;
    color: var(--blue-accent);
  }

  .race-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--pink), var(--yellow));
    border: 2px solid var(--pink-dark);
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-top: 14px;
    box-shadow: 0 4px 12px #e8aabb30;
  }

  /* Week navigation pills */
  .week-nav {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 0 4px;
    scrollbar-width: none;
    animation: fadeUp 0.8s 0.2s ease both;
  }
  .week-nav::-webkit-scrollbar { display: none; }

  .week-pill {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 2px solid transparent;
    background: var(--blue);
    color: var(--text);
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .week-pill:hover, .week-pill.active {
    background: var(--blue-accent);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px #7cb9e840;
  }
  .week-pill.race { background: var(--pink); }
  .week-pill.race:hover, .week-pill.race.active {
    background: var(--pink-accent);
  }

  /* Week section */
  .week-section {
    margin-top: 24px;
    animation: fadeUp 0.5s ease both;
  }

  .week-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .week-number {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--pink-dark);
    line-height: 1;
    opacity: 0.6;
  }

  .week-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .week-info p {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 2px;
  }

  /* Workout card */
  .workout-card {
    background: white;
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: 0 4px 20px #d4849a15;
    border: 1.5px solid #f0e4ea;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .workout-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px #d4849a22; }

  .card-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .day-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .day-icon.strength { background: linear-gradient(135deg, var(--pink), var(--pink-dark)); }
  .day-icon.gym { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); }
  .day-icon.run { background: linear-gradient(135deg, var(--yellow), var(--yellow-dark)); }
  .day-icon.conditioning { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
  .day-icon.rest { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }
  .day-icon.race { background: linear-gradient(135deg, var(--pink), var(--yellow)); }

  .card-title {
    flex: 1;
  }
  .card-title h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .card-title .date-tag {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }

  .time-badge {
    font-size: 11px;
    color: var(--text-light);
    background: var(--yellow);
    border-radius: 20px;
    padding: 4px 10px;
    font-weight: 500;
    white-space: nowrap;
  }

  .chevron {
    font-size: 14px;
    color: var(--pink-accent);
    transition: transform 0.3s ease;
    margin-left: 4px;
  }
  .workout-card.open .chevron { transform: rotate(180deg); }

  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .workout-card.open .card-body { max-height: 1200px; }

  .card-content {
    padding: 0 18px 18px;
    border-top: 1.5px dashed #f0e4ea;
    padding-top: 14px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--pink-accent);
    margin-top: 12px;
    margin-bottom: 6px;
  }
  .section-label:first-child { margin-top: 0; }

  .exercise-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .exercise-list li {
    font-size: 13.5px;
    color: var(--text);
    padding: 7px 12px;
    background: var(--white);
    border-radius: 10px;
    border: 1px solid #f0e4ea;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .exercise-list li::before {
    content: '✿';
    color: var(--pink-accent);
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .rounds-tag {
    display: inline-block;
    background: linear-gradient(135deg, var(--pink), var(--yellow));
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin: 8px 0;
  }

  .rest-note {
    font-size: 12px;
    color: var(--text-light);
    font-style: italic;
    margin-top: 8px;
    padding: 6px 10px;
    background: var(--blue);
    border-radius: 8px;
  }

  .hyrox-sequence {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .hyrox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    padding: 6px 10px;
    background: var(--blue);
    border-radius: 10px;
  }
  .hyrox-row .run-tag {
    background: var(--yellow-dark);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .hyrox-row .station {
    font-weight: 500;
    color: var(--text);
  }

  /* Completion checkbox */
  .complete-btn {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    border-radius: 12px;
    border: 2px solid var(--pink-dark);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--pink-accent);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .complete-btn:hover { background: var(--pink); }
  .complete-btn.done {
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    border-color: var(--pink-accent);
    color: white;
  }

  /* Progress bar */
  .progress-section {
    background: white;
    border-radius: var(--radius);
    padding: 18px;
    margin: 20px 0;
    border: 1.5px solid #f0e4ea;
    box-shadow: 0 4px 16px #d4849a10;
    animation: fadeUp 0.8s 0.3s ease both;
  }
  .progress-section h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    margin-bottom: 10px;
    color: var(--text);
  }
  .progress-bar {
    height: 10px;
    background: var(--pink);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink-accent), var(--blue-accent));
    border-radius: 10px;
    transition: width 0.6s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
  }

  /* Race day card */
  .race-day-card {
    background: linear-gradient(135deg, var(--pink) 0%, var(--yellow) 50%, var(--blue) 100%);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    border: 2px solid var(--pink-dark);
    box-shadow: 0 8px 32px #d4849a30;
    margin-bottom: 14px;
  }
  .race-day-card .race-emoji { font-size: 48px; display: block; margin-bottom: 10px; }
  .race-day-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
  }
  .race-day-card p { font-size: 14px; color: var(--text-light); margin-top: 6px; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,253,249,0.92);
    backdrop-filter: blur(12px);
    border-top: 1.5px solid #f0e4ea;
    display: flex;
    justify-content: space-around;
    padding: 10px 0 14px;
    z-index: 100;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s ease;
  }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn.active { color: var(--pink-accent); }

  .hidden { display: none !important; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall 1.2s ease-out forwards;
  }
  @keyframes confettiFall {
    from { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    to { opacity: 0; transform: translateY(80vh) rotate(720deg); }
  }

  /* Notes tab */
  .notes-area {
    background: white;
    border-radius: var(--radius);
    padding: 18px;
    border: 1.5px solid #f0e4ea;
    margin-top: 20px;
    box-shadow: 0 4px 16px #d4849a10;
  }
  .notes-area h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-bottom: 12px;
  }
  .notes-area textarea {
    width: 100%;
    min-height: 120px;
    border: 1.5px solid #f0e4ea;
    border-radius: 12px;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    resize: vertical;
    outline: none;
    background: var(--white);
    transition: border-color 0.2s;
  }
  .notes-area textarea:focus { border-color: var(--pink-accent); }
</style>
</head>

<div class="container">

    <div id="weeks-container"></div>

  </div>

  <!-- View: Notes -->
  <div id="view-notes" class="hidden">
    <div class="notes-area" style="margin-top:28px">

    <div class="notes-area" style="margin-top:14px">
      <h3>🌟 Goals & Mantras</h3>
      <textarea id="goals-text" placeholder="Write your goals, your 'why', your race day mantra... 🏁"></textarea>
    </div>
  </div>

</div>

<!-- Bottom nav -->
<div class="bottom-nav">

  <button class="nav-btn" onclick="showView('notes', this)">

</div>

// Load completions from memory (in-app state)
let done = {};
try {
  const saved = localStorage.getItem(TOTAL_WORKOUTS_KEY);
  if (saved) done = JSON.parse(saved);
} catch(e) {}

function saveDone() {
  try { localStorage.setItem(TOTAL_WORKOUTS_KEY, JSON.stringify(done)); } catch(e) {}
  updateProgress();
}

function updateProgress() {
  const total = weeks.reduce((a, w) => a + w.days.filter(d => d.type !== 'rest').length, 0);
  const completed = Object.values(done).filter(Boolean).length;
  const pct = Math.round((completed / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = completed + ' workouts done';
  document.getElementById('progress-pct').textContent = pct + '%';
}

function renderWeeks() {
  const nav = document.getElementById('week-nav');
  const container = document.getElementById('weeks-container');

  weeks.forEach((week, wi) => {
    // Nav pill
    const pill = document.createElement('button');
    pill.className = 'week-pill' + (week.isRaceWeek ? ' race' : '') + (wi === 0 ? ' active' : '');
    pill.textContent = week.label;
    pill.onclick = () => {
      document.querySelectorAll('.week-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      document.querySelectorAll('.week-section').forEach(s => s.classList.add('hidden'));
      document.getElementById('week-' + wi).classList.remove('hidden');
      document.getElementById('week-' + wi).scrollIntoView({behavior: 'smooth', block: 'start'});
    };
    nav.appendChild(pill);

    // Week section
    const section = document.createElement('div');
    section.className = 'week-section' + (wi > 0 ? ' hidden' : '');
    section.id = 'week-' + wi;

    let html = `<div class="week-header">
      <div class="week-number">${week.isRaceWeek ? '🏁' : week.num}</div>
      <div class="week-info">
        <h2>${week.label}</h2>
        <p>${week.subtitle}</p>
      </div>
    </div>`;

    week.days.forEach(day => {
      if (day.type === 'race') {
        html += `<div class="race-day-card">
          <span class="race-emoji">🏁</span>
          <h2>HYROX Race Day!</h2>
          <p>${day.date}</p>
          <p style="margin-top:10px; font-size:15px; font-weight:600; color:var(--pink-accent)">${day.notes}</p>
        </div>`;
        return;
      }

      const isDone = done[day.id];
      html += `<div class="workout-card${isDone ? ' done-card' : ''}" id="card-${day.id}" ${day.type === 'rest' ? '' : `onclick="toggleCard('${day.id}')"`}>
        <div class="card-header">
          <div class="day-icon ${day.type}">${day.icon}</div>
          <div class="card-title">
            <h3>${day.title}</h3>
            <div class="date-tag">📅 ${day.date}</div>
          </div>
          <div class="time-badge">⏱ ${day.time}</div>
          ${day.type !== 'rest' ? '<span class="chevron">▾</span>' : ''}
        </div>`;

      if (day.type !== 'rest') {
        html += `<div class="card-body"><div class="card-content">`;

        if (day.warmup) {
          html += `<div class="section-label">Warmup</div><ul class="exercise-list">`;
          day.warmup.forEach(w => { html += `<li>${w}</li>`; });
          html += `</ul>`;
        }

        if (day.hyrox) {
          html += `<div class="section-label">HYROX Sequence</div><div class="hyrox-sequence">`;
          day.hyrox.forEach(r => {
            html += `<div class="hyrox-row"><span class="run-tag">${r.run}</span><span class="station">→ ${r.station}</span></div>`;
          });
          html += `</div>`;
        } else if (day.exercises) {
          if (day.rounds) html += `<div class="rounds-tag">🔄 ${day.rounds}</div>`;
          html += `<ul class="exercise-list">`;
          day.exercises.forEach(e => { html += `<li>${e}</li>`; });
          html += `</ul>`;
        }

        if (day.rest) html += `<div class="rest-note">💙 ${day.rest}</div>`;
        if (day.notes && day.type !== 'rest') html += `<div class="rest-note">✨ ${day.notes}</div>`;

        html += `<button class="complete-btn ${isDone ? 'done' : ''}" id="btn-${day.id}" onclick="event.stopPropagation(); markDone('${day.id}')">
          ${isDone ? '✅ Completed! Great work!' : '☐ Mark as done'}
        </button>`;

        html += `</div></div>`;
      } else {
        if (day.notes) html += `<div style="padding: 0 18px 14px; font-size: 13px; color: var(--text-light);">${day.notes}</div>`;
      }

      html += `</div>`;
    });

    section.innerHTML = html;
    container.appendChild(section);
  });

  updateProgress();
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

function markDone(id) {
  done[id] = !done[id];
  saveDone();
  const btn = document.getElementById('btn-' + id);
  btn.textContent = done[id] ? '✅ Completed! Great work!' : '☐ Mark as done';
  btn.className = 'complete-btn' + (done[id] ? ' done' : '');
  if (done[id]) spawnConfetti(btn);
}

function spawnConfetti(btn) {
  const colors = ['#f7d6df', '#fde68a', '#bfdbfe', '#d4849a', '#7cb9e8', '#fce4ec'];
  const rect = btn.getBoundingClientRect();
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${rect.left + rect.width/2 + (Math.random()-0.5)*60}px;
      top: ${rect.top}px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay: ${Math.random()*0.3}s;
      transform: rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

function showView(view, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-plan').classList.toggle('hidden', view !== 'plan');
  document.getElementById('view-notes').classList.toggle('hidden', view !== 'notes');
}

// Notes persistence
function initNotes() {
  const ta = document.getElementById('notes-text');
  const ga = document.getElementById('goals-text');
  try {
    ta.value = localStorage.getItem('hyrox_notes') || '';
    ga.value = localStorage.getItem('hyrox_goals') || '';
  } catch(e) {}
  ta.addEventListener('input', () => { try { localStorage.setItem('hyrox_notes', ta.value); } catch(e) {} });
  ga.addEventListener('input', () => { try { localStorage.setItem('hyrox_goals', ga.value); } catch(e) {} });
}

renderWeeks();
initNotes();
